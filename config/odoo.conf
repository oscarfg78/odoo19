[options]
; Configuración básica de base de datos (se puede omitir si se usan env vars en docker-compose)
; admin_passwd = admin
; db_host = db
; db_port = 5432
; db_user = odoo
; db_password = odoo

; Rutas de addons (ajustadas para el contenedor)
addons_path = /usr/lib/python3/dist-packages/odoo/addons,/mnt/extra-addons/addons,/mnt/extra-addons/extra-addons
default_productivity_apps = True

; --- Logging ---
logfile = /var/log/odoo/odoo-server.log
log_level = info

; --- Performance (Ajustar según recursos del servidor) ---
workers = 3
max_cron_threads = 1
limit_memory_hard = 2684354560
limit_memory_soft = 2147483648
limit_request = 8192
limit_time_cpu = 600
limit_time_real = 1200

; --- Proxy (Habilitar si se usa Nginx/Traefik) ---
proxy_mode = True
