[options]
; --- Base de datos ---
; Estos valores se sobrescriben por el entrypoint.sh usando variables de Railway
; admin_passwd = admin

; --- Rutas de addons ---
addons_path = /usr/lib/python3/dist-packages/odoo/addons,/mnt/extra-addons/addons,/mnt/extra-addons/extra-addons
default_productivity_apps = True

; --- Logging ---
; En Railway, es mejor loguear a stdout, pero mantenemos el archivo por compatibilidad
logfile = /var/log/odoo/odoo-server.log
log_level = info

; --- Performance (Optimizado para Railway) ---
; Si usas un tier pequeño (<1GB RAM), usa workers = 0.
; Para tiers de 2GB+, usa workers = 2 o 3.
workers = 2
max_cron_threads = 1
limit_memory_hard = 2684354560
limit_memory_soft = 2147483648
limit_request = 8192
limit_time_cpu = 600
limit_time_real = 1200

; --- Proxy (Obligatorio para Railway/Cloud) ---
proxy_mode = True
without_demo = True
