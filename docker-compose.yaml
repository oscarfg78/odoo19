services:
  web:
    build: .
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    ports:
      - "${ODOO_PORT:-8069}:${PORT:-8069}"
    volumes:
      - odoo-data:/var/lib/odoo
      - ./config:/etc/odoo
      - ./addons:/mnt/extra-addons/addons
      - ./extra-addons:/mnt/extra-addons/extra-addons
      - ./logs:/var/log/odoo
    environment:
      - HOST=${POSTGRES_HOST:-db}
      - USER=${POSTGRES_USER:-odoo}
      - PASSWORD=${POSTGRES_PASSWORD:-odoo_password_change_me}
      - PORT=${POSTGRES_PORT:-5432}
      - ODOO_PASSWORD=${ODOO_ADMIN_PASSWORD:-admin_password_change_me}
      - REDIS_HOST=${REDIS_HOST:-redis}
    restart: ${RESTART_POLICY:-always}

  db:
    image: postgres:16-alpine
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-postgres}
      - POSTGRES_USER=${POSTGRES_USER:-odoo}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-odoo_password_change_me}
    volumes:
      - odoo-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-odoo}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: ${RESTART_POLICY:-always}

  redis:
    image: redis:7-alpine
    restart: ${RESTART_POLICY:-always}

volumes:
  odoo-data:
  odoo-db-data:
